<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #reader {
      width: 100%;
      max-width: 500px;
      border: 2px solid #4CAF50;
      border-radius: 12px;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }
    #btnStop {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="status">🎯 Наведите камеру на штрихкод</div>
  <button id="btnStop">⏹ Завершить</button>

  <script>
    let html5QrCode = null;
    let isScanning = true;
    const statusEl = document.getElementById('status');
    
    function sendToParent(barcode) {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'barcode_scanned', barcode }, '*');
      }
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'barcode_scanned', barcode }, '*');
      }
    }
    
    async function startScanner() {
      try {
        html5QrCode = new Html5Qrcode("reader");
        
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            if (isScanning && decodedText) {
              sendToParent(decodedText);
              statusEl.textContent = '✓ ' + decodedText;
              statusEl.style.color = '#4CAF50';
              setTimeout(() => {
                statusEl.textContent = '🎯 Наведите камеру на штрихкод';
                statusEl.style.color = '';
              }, 800);
            }
          },
          () => {}
        );
      } catch (err) {
        statusEl.textContent = 'Ошибка: ' + err.message;
        statusEl.style.color = '#f44336';
      }
    }
    
    document.getElementById('btnStop').addEventListener('click', () => {
      isScanning = false;
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          window.close();
        });
      }
    });
    
    window.addEventListener('load', () => startScanner());
  </script>
</body>
</html>
