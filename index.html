<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер ШК</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #video {
      width: 100%;
      max-width: 500px;
      border: 3px solid #27ae60;
      border-radius: 16px;
      background: #111;
    }
    #status {
      margin-top: 15px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      min-height: 24px;
    }
    #btnStop {
      margin-top: 20px;
      padding: 14px 28px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .success { color: #51cf66; }
    .cooldown { color: #ffd43b; }
    .error { color: #ff6b6b; }
    #debug {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <div id="status">📷 Инициализация...</div>
  <div id="debug"></div>
  <button id="btnStop">⏹ Завершить</button>

  <script>
    let isScanning = true;
    let cooldownActive = false;
    let detectionInterval = null;
    let stream = null;
    const videoEl = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');

    function log(msg) {
      console.log('[SCANNER]', msg);
      debugEl.textContent = msg;
    }

    function sendToParent(barcode) {
      const clean = barcode.replace(/\*/g, '').trim();
      log('📤 Отправка: ' + clean);
      
      try {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
        }
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
        }
      } catch (e) { 
        log('❌ Ошибка отправки: ' + e.message);
      }
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.value = 0.1;
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) {}
    }

    async function startScanning() {
      try {
        log('Запрос камеры...');
        statusEl.textContent = '📷 Запрос камеры...';
        
        // Запрашиваем камеру
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        
        log('Камера получена');
        videoEl.srcObject = stream;
        
        await new Promise((resolve) => {
          videoEl.onloadedmetadata = () => {
            videoEl.play();
            log('Видео запущено');
            resolve();
          };
        });

        // Проверяем поддержку Barcode Detection API
        if ('BarcodeDetector' in window) {
          log('✅ Barcode Detection API поддерживается');
          startBarcodeDetection();
        } else {
          log('❌ Barcode Detection API НЕ поддерживается');
          statusEl.textContent = '⚠️ Браузер не поддерживается. Используйте Chrome/Edge';
          statusEl.className = 'error';
        }
        
      } catch (err) {
        log('❌ Ошибка: ' + err.message);
        statusEl.textContent = '⚠️ ' + err.message;
        statusEl.className = 'error';
      }
    }

    async function startBarcodeDetection() {
      try {
        const barcodeDetector = new BarcodeDetector({
          formats: ['code_128', 'code_39', 'code_93', 'codabar', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'qr_code']
        });
        
        log('Детектор создан');
        statusEl.textContent = '🎯 Наведите на штрихкод';
        
        async function detectLoop() {
          if (!isScanning || !videoEl || videoEl.paused || videoEl.ended) return;
          
          if (!cooldownActive) {
            try {
              const barcodes = await barcodeDetector.detect(videoEl);
              
              if (barcodes.length > 0) {
                const barcode = barcodes[0].rawValue;
                log('✅ Найдено: ' + barcode);
                
                if (barcode && barcode.length > 5) {
                  // Активируем паузу
                  cooldownActive = true;
                  statusEl.textContent = '⏳ Пауза 2 сек...';
                  statusEl.className = 'cooldown';
                  
                  // Отправляем
                  sendToParent(barcode);
                  
                  // Визуальный и звуковой фидбек
                  const displayText = barcode.replace(/\*/g, '');
                  statusEl.textContent = '✓ ' + displayText;
                  statusEl.className = 'success';
                  playBeep();
                  
                  // Возврат к сканированию через 2 секунды
                  setTimeout(() => {
                    cooldownActive = false;
                    statusEl.textContent = '🎯 Наведите на штрихкод';
                    statusEl.className = '';
                  }, 2000);
                }
              }
            } catch (err) {
              // Игнорируем ошибки детекции
            }
          }
          
          // Проверяем каждые 100мс
          detectionInterval = setTimeout(detectLoop, 100);
        }
        
        // Запускаем цикл
        detectLoop();
        
      } catch (err) {
        log('❌ Ошибка детектора: ' + err.message);
        statusEl.textContent = '⚠️ ' + err.message;
        statusEl.className = 'error';
      }
    }

    document.getElementById('btnStop').addEventListener('click', () => {
      isScanning = false;
      if (detectionInterval) clearTimeout(detectionInterval);
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      statusEl.textContent = '✅ Завершено';
      setTimeout(() => window.close(), 500);
    });

    window.addEventListener('load', () => {
      log('Страница загружена');
      setTimeout(startScanning, 500);
    });

    window.addEventListener('beforeunload', () => {
      isScanning = false;
      if (detectionInterval) clearTimeout(detectionInterval);
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
