<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: #000; 
      color: #fff; 
      height: 100dvh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    #reader { width: 100%; max-width: 500px; border: 2px solid #27ae60; border-radius: 12px; }
    #status { margin-top: 15px; font-size: 16px; text-align: center; }
    #btnStop { 
      margin-top: 20px; 
      padding: 12px 24px; 
      background: #f44336; 
      color: #fff; 
      border: none; 
      border-radius: 10px; 
      font-size: 15px; 
      cursor: pointer;
    }
    #debug { 
      margin-top: 10px; 
      padding: 10px; 
      background: #222; 
      border-radius: 8px; 
      font-size: 12px; 
      color: #0f0;
      max-height: 150px;
      overflow-y: auto;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="status">🎯 Наведите на штрихкод</div>
  <button id="btnStop">⏹ Завершить</button>
  <div id="debug">Ожидание...</div>

  <script>
    let html5QrCode = null;
    let scanCount = 0;
    
    function debug(msg) {
      const el = document.getElementById('debug');
      el.textContent = msg;
      console.log('[DEBUG]', msg);
    }
    
    function sendToParent(barcode) {
      const clean = barcode.replace(/\*/g, '').trim();
      debug('📤 ОТПРАВКА: ' + clean);
      
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
      }
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
      }
    }

    async function start() {
      debug('Инициализация...');
      try {
        html5QrCode = new Html5Qrcode("reader");
        
        // Получаем список камер
        const cameras = await Html5Qrcode.getCameras();
        debug('Найдено камер: ' + cameras.length);
        
        if (cameras.length === 0) {
          throw new Error('Камеры не найдены');
        }
        
        // Простая конфигурация
        await html5QrCode.start(
          { facingMode: "environment" },
          { 
            fps: 5,  // Медленнее для стабильности
            qrbox: { width: 300, height: 150 }
          },
          (text) => {
            scanCount++;
            debug('✅ СКАН #' + scanCount + ': ' + text);
            document.getElementById('status').textContent = '✓ ' + text;
            document.getElementById('status').style.color = '#51cf66';
            sendToParent(text);
            
            // Звук
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = ctx.createOscillator();
              osc.connect(ctx.destination);
              osc.frequency.value = 800;
              osc.start();
              osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
            
            setTimeout(() => {
              document.getElementById('status').textContent = '🎯 Наведите на штрихкод';
              document.getElementById('status').style.color = '';
            }, 1500);
          },
          (err) => {
            // Тихие ошибки - это нормально
          }
        );
        
        debug('✅ Сканер запущен. Наведите камеру на ШК');
        
      } catch (err) {
        debug('❌ ОШИБКА: ' + err.message);
        document.getElementById('status').textContent = '⚠️ ' + err.message;
        document.getElementById('status').style.color = '#ff6b6b';
      }
    }

    document.getElementById('btnStop').addEventListener('click', () => {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          debug('Остановлено');
          window.close();
        });
      }
    });

    window.addEventListener('load', () => setTimeout(start, 500));
  </script>
</body>
</html>
