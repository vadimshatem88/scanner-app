<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер</title>
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #scanner {
      width: 100%;
      max-width: 500px;
      height: 300px;
      border: 2px solid #27ae60;
      border-radius: 16px;
      overflow: hidden;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }
    #btnStop {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="scanner"></div>
  <div id="status">🎯 Наведите на штрихкод</div>
  <button id="btnStop">⏹ Завершить</button>

  <script>
    let isScanning = true;
    
    function sendToParent(barcode) {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'barcode_scanned', barcode }, '*');
      }
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'barcode_scanned', barcode }, '*');
      }
    }
    
    Quagga.init({
      inputStream: {
        name: "Live",
        type: "LiveStream",
        target: document.querySelector('#scanner'),
        constraints: {
          facingMode: "environment"
        },
        area: {
          top: "0%",
          right: "0%",
          left: "0%",
          bottom: "0%"
        }
      },
      decoder: {
        readers: [
          "code_128_reader",
          "code_39_reader",
          "code_93_reader",
          "ean_reader",
          "ean_8_reader",
          "upc_reader",
          "upc_e_reader"
        ],
        multiple: false
      },
      locator: {
        patchSize: "medium",
        halfSample: true
      }
    }, function(err) {
      if (err) {
        document.getElementById('status').textContent = '⚠️ Ошибка: ' + err;
        return;
      }
      Quagga.start();
    });
    
    Quagga.onDetected(function(data) {
      if (isScanning && data.codeResult && data.codeResult.code) {
        const barcode = data.codeResult.code;
        sendToParent(barcode);
        
        const statusEl = document.getElementById('status');
        statusEl.textContent = '✓ ' + barcode;
        statusEl.style.color = '#4CAF50';
        
        setTimeout(() => {
          if (isScanning) {
            statusEl.textContent = '🎯 Наведите на штрихкод';
            statusEl.style.color = '';
          }
        }, 800);
      }
    });
    
    document.getElementById('btnStop').addEventListener('click', () => {
      isScanning = false;
      Quagga.stop();
      setTimeout(() => window.close(), 500);
    });
  </script>
</body>
</html>
