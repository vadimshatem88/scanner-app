<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Сканер ШК</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    #reader {
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #27ae60;
      position: relative;
      background: #111;
    }
    #reader video { border-radius: 16px; }
    
    #status {
      margin-top: 15px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      min-height: 24px;
      transition: all 0.2s;
    }
    
    #btnStop {
      margin-top: 20px;
      padding: 12px 28px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(244,67,54,0.3);
    }
    #btnStop:active { transform: scale(0.97); }
    
    .success { color: #51cf66; }
    .cooldown { color: #ffd43b; }
    .error { color: #ff6b6b; }
    
    /* Скрываем лишние элементы библиотеки для чистого интерфейса */
    #reader > div:not(#reader__scan_region) { display: none !important; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="status">🎯 Наведите на штрихкод</div>
  <button id="btnStop">⏹ Завершить</button>

  <script>
    let html5QrCode = null;
    let cooldownActive = false;
    const statusEl = document.getElementById('status');
    
    // Отправка данных в родительское окно (Apps Script)
    function sendToParent(barcode) {
      // ✅ Убираем звёздочки и пробелы
      const clean = barcode.replace(/\*/g, '').trim();
      try {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
        }
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
        }
      } catch (e) { console.error(e); }
    }

    async function startScanner() {
      try {
        statusEl.textContent = '📷 Инициализация...';
        html5QrCode = new Html5Qrcode("reader");
        
        // ✅ Настройки специально для 1D штрихкодов (Code 128 / Code 39)
        const config = {
          fps: 10,
          qrbox: { width: 280, height: 100 }, // Прямоугольная область (лучше для линейных ШК)
          aspectRatio: 2.0,
          disableFlip: true,
          formatsToSupport: [
            Html5QrcodeSupportedFormats.CODE_128, // Основной формат твоих бирок
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.QR_CODE
          ]
        };

        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );
        
        statusEl.textContent = '🎯 Наведите на штрихкод';
      } catch (err) {
        statusEl.textContent = '⚠️ ' + (err.message || 'Ошибка камеры');
        statusEl.className = 'error';
      }
    }

    // ✅ Успешное сканирование
    function onScanSuccess(decodedText, decodedResult) {
      if (cooldownActive) return; // Игнорируем сканы во время паузы
      
      // Активируем паузу на 2 секунды
      cooldownActive = true;
      statusEl.textContent = '⏳ Пауза 2 сек...';
      statusEl.className = 'cooldown';
      
      // Отправляем очищенный код
      sendToParent(decodedText);
      
      // Визуальный и звуковой фидбек
      const displayText = decodedText.replace(/\*/g, '');
      statusEl.textContent = '✓ ' + displayText;
      statusEl.className = 'success';
      playBeep();

      // Таймер возврата к сканированию
      setTimeout(() => {
        cooldownActive = false;
        statusEl.textContent = '🎯 Наведите на штрихкод';
        statusEl.className = '';
      }, 2000);
    }

    function onScanFailure(error) {
      // Ошибки в потоке нормальны (нет ШК в кадре), игнорируем
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.value = 0.1;
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) {}
    }

    document.getElementById('btnStop').addEventListener('click', () => {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          statusEl.textContent = '✅ Готово';
          setTimeout(() => window.close(), 500);
        }).catch(console.error);
      }
    });

    window.addEventListener('load', () => setTimeout(startScanner, 300));
    window.addEventListener('beforeunload', () => {
      if (html5QrCode) html5QrCode.stop().catch(() => {});
    });
  </script>
</body>
</html>
