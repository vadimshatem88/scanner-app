<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер</title>
  <script src="https://rawgit.com/schmich/instascan/master/build/instascan.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui; 
      background: #000; 
      color: #fff; 
      height: 100dvh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    #video { 
      width: 100%; 
      max-width: 500px; 
      border: 3px solid #27ae60; 
      border-radius: 12px;
      transform: scaleX(-1); /* Зеркально для удобства */
    }
    #status { 
      margin: 15px 0; 
      font-size: 16px; 
      text-align: center;
      min-height: 24px;
    }
    #btnScan {
      margin: 10px;
      padding: 15px 30px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #btnStop {
      padding: 12px 24px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .success { color: #51cf66 !important; }
    #log {
      margin-top: 10px;
      padding: 10px;
      background: #111;
      border-radius: 8px;
      font-size: 13px;
      color: #0f0;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <div id="status">Нажмите "Сканировать"</div>
  <button id="btnScan">📷 Сканировать</button>
  <button id="btnStop">⏹ Завершить</button>
  <div id="log">Ожидание...</div>

  <script>
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    let scanner = null;
    let isScanning = false;
    let lastScan = 0;
    
    function log(msg) {
      logEl.textContent = msg;
      console.log(msg);
    }
    
    function sendToParent(barcode) {
      const clean = barcode.replace(/\*/g, '').trim();
      log('📤 ОТПРАВЛЕНО: ' + clean);
      
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
      }
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'barcode_scanned', barcode: clean }, '*');
      }
    }

    document.getElementById('btnScan').addEventListener('click', async () => {
      if (isScanning) return;
      
      try {
        log('Запрос камеры...');
        statusEl.textContent = '📷 Включение...';
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        video.play();
        
        log('Камера активна. Используйте ZXing...');
        statusEl.textContent = '🎯 Наведите на штрихкод';
        isScanning = true;
        
        // ZXing Library
        const codeReader = new ZXing.BrowserMultiFormatReader();
        
        codeReader.decodeFromVideoDevice(
          undefined,
          video,
          (result, err) => {
            if (result && result.text) {
              const now = Date.now();
              if (now - lastScan < 2000) return; // Пауза 2 сек
              lastScan = now;
              
              const text = result.text;
              log('✅ НАЙДЕНО: ' + text);
              statusEl.textContent = '✓ ' + text;
              statusEl.className = 'success';
              
              sendToParent(text);
              
              // Звук
              try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.value = 800;
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
              } catch(e) {}
              
              setTimeout(() => {
                statusEl.textContent = '🎯 Наведите на штрихкод';
                statusEl.className = '';
              }, 1500);
            }
          }
        );
        
        scanner = codeReader;
        
      } catch (err) {
        log('❌ Ошибка: ' + err.message);
        statusEl.textContent = '⚠️ ' + err.message;
      }
    });

    document.getElementById('btnStop').addEventListener('click', () => {
      if (scanner) {
        scanner.reset();
      }
      const tracks = video.srcObject?.getTracks();
      tracks?.forEach(t => t.stop());
      isScanning = false;
      statusEl.textContent = '✅ Завершено';
      setTimeout(() => window.close(), 500);
    });
  </script>
</body>
</html>
