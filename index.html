<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #video {
      width: 100%;
      max-width: 500px;
      border: 2px solid #27ae60;
      border-radius: 16px;
      background: #111;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }
    #btnStop {
      margin-top: 20px;
      padding: 12px 24px;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #ff6b6b !important; }
    .success { color: #51cf66 !important; }
    .fallback-link {
      margin-top: 15px;
      padding: 10px 20px;
      background: #4CAF50;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <div id="status">📷 Инициализация...</div>
  <button id="btnStop">⏹ Завершить</button>
  <a href="?fallback=1" class="fallback-link" id="fallbackBtn">🔄 Попробовать другой сканер</a>

  <script>
    let isScanning = true;
    let stream = null;
    let detectionInterval = null;
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video');
    
    function sendToParent(barcode) {
      try {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'barcode_scanned', barcode }, '*');
        }
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'barcode_scanned', barcode }, '*');
        }
      } catch (e) { console.error(e); }
    }
    
    async function startBarcodeDetection() {
      try {
        // Проверяем поддержку Barcode Detection API
        if (!('BarcodeDetector' in window)) {
          throw new Error('Barcode Detection API не поддерживается');
        }
        
        statusEl.textContent = '📷 Запрос камеры...';
        
        // Запрашиваем камеру
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        
        videoEl.srcObject = stream;
        await new Promise(resolve => {
          videoEl.onloadedmetadata = () => {
            videoEl.play();
            resolve();
          };
        });
        
        statusEl.textContent = '🎯 Наведите на штрихкод';
        
        // Создаём детектор
        const barcodeDetector = new BarcodeDetector({
          formats: ['code_128', 'code_39', 'code_93', 'codabar', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'qr_code']
        });
        
        // Функция детекции
        async function detectBarcode() {
          if (!isScanning || videoEl.paused || videoEl.ended) return;
          
          try {
            const barcodes = await barcodeDetector.detect(videoEl);
            
            if (barcodes.length > 0) {
              const barcode = barcodes[0].rawValue;
              if (barcode) {
                sendToParent(barcode);
                statusEl.textContent = '✓ ' + barcode;
                statusEl.className = 'success';
                
                // Звук
                try {
                  const ctx = new (window.AudioContext || window.webkitAudioContext)();
                  const osc = ctx.createOscillator();
                  const gain = ctx.createGain();
                  osc.connect(gain);
                  gain.connect(ctx.destination);
                  osc.frequency.value = 800;
                  osc.type = 'sine';
                  gain.gain.value = 0.1;
                  osc.start();
                  osc.stop(ctx.currentTime + 0.1);
                } catch(e) {}
                
                setTimeout(() => {
                  if (isScanning) {
                    statusEl.textContent = '🎯 Наведите на штрихкод';
                    statusEl.className = '';
                  }
                }, 1000);
              }
            }
          } catch (err) {
            console.error('Ошибка детекции:', err);
          }
        }
        
        // Запускаем детекцию (10 раз в секунду)
        detectionInterval = setInterval(detectBarcode, 100);
        
      } catch (err) {
        console.error('Ошибка:', err);
        statusEl.textContent = '⚠️ ' + (err.message || 'Ошибка');
        statusEl.className = 'error';
        
        // Показываем кнопку fallback
        document.getElementById('fallbackBtn').style.display = 'inline-block';
      }
    }
    
    document.getElementById('btnStop').addEventListener('click', () => {
      isScanning = false;
      if (detectionInterval) clearInterval(detectionInterval);
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      statusEl.textContent = '✅ Завершено';
      setTimeout(() => window.close(), 500);
    });
    
    window.addEventListener('load', startBarcodeDetection);
    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (detectionInterval) clearInterval(detectionInterval);
    });
  </script>
</body>
</html>
