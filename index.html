<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Сканер ШК</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 30px; }
    
    .input-group {
      width: 100%;
      max-width: 340px;
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 6px;
      text-align: left;
    }
    #locationInput {
      width: 100%;
      padding: 16px 14px;
      font-size: 17px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
    }
    #locationInput:focus { border-color: #4a90e2; }
    
    #btnStartScanning {
      width: 100%;
      max-width: 340px;
      padding: 18px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: #27ae60;
      color: #fff;
      cursor: pointer;
      margin-bottom: 15px;
    }
    #btnStartScanning:active { background: #219a52; }
    
    .hint {
      font-size: 12px;
      opacity: 0.4;
      max-width: 300px;
      margin-top: 10px;
    }
    
    /* Стили для всплывающего окна сканера */
    #scannerWindow {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #scannerWindow.active { display: flex; }
    
    #scannerFrame {
      width: 100%;
      max-width: 500px;
      height: 70dvh;
      border: 2px solid #27ae60;
      border-radius: 16px;
      background: #000;
    }
    
    #btnCloseScanner {
      margin-top: 15px;
      padding: 12px 24px;
      background: rgba(220,53,69,0.8);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(39,174,96,0.92);
      color: #fff;
      padding: 14px 26px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 700;
      z-index: 1100;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
      max-width: 90vw;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: rgba(220,53,69,0.92); }
    
    #counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #ddd;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 15px;
    }
    #counter strong { color: #27ae60; font-size: 17px; }
  </style>
</head>
<body>
  
  <h1>📦 Сканер склада</h1>
  <p class="subtitle">Шаг 1. Укажите место сканирования</p>
  
  <div class="input-group">
    <label for="locationInput">📍 Название стеллажа / зоны</label>
    <input type="text" id="locationInput" placeholder="Например: Экспресс Москва" autocomplete="off">
  </div>
  
  <button id="btnStartScanning">▶ Начать сканирование</button>
  
  <p class="hint">Камера откроется в новом окне.<br>Поддерживаются QR и Code 39</p>
  
  <!-- Всплывающее окно для сканера -->
  <div id="scannerWindow">
    <!-- Здесь будет iframe с внешним сканером -->
    <iframe id="scannerFrame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    <button id="btnCloseScanner">⏹ Завершить сканирование</button>
  </div>
  
  <div id="toast"><span id="toastText"></span></div>
  <div id="counter">Отсканировано: <strong id="counterValue">0</strong> шт.</div>

  <script>
    // Состояние
    let currentLocation = '';
    let locationScanCount = 0;
    let scannerWindow = null;
    
    // Элементы
    const locationInput = document.getElementById('locationInput');
    const btnStartScanning = document.getElementById('btnStartScanning');
    const btnCloseScanner = document.getElementById('btnCloseScanner');
    const scannerWindowEl = document.getElementById('scannerWindow');
    const scannerFrame = document.getElementById('scannerFrame');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    const counterValue = document.getElementById('counterValue');
    
    let toastTimeout = null;
    
    // URL ВНЕШНЕГО сканера (ЗАМЕНИ НА СВОЙ!)
    // Пример: 'https://tvoj-skaner.vercel.app/scanner.html'
    const EXTERNAL_SCANNER_URL = 'https://tvoj-skaner.vercel.app/scanner.html';
    
    // Запуск сканирования
    btnStartScanning.addEventListener('click', () => {
      const loc = locationInput.value.trim();
      if (!loc) {
        showToast('Введите название стеллажа', true);
        return;
      }
      
      currentLocation = loc;
      locationScanCount = 0;
      counterValue.textContent = '0';
      
      // Показываем окно сканера
      scannerWindowEl.classList.add('active');
      
      // Загружаем внешний сканер в iframe
      // Важно: внешний домен должен отправлять данные через postMessage
      scannerFrame.src = `${EXTERNAL_SCANNER_URL}?location=${encodeURIComponent(loc)}`;
      
      // Слушаем сообщения от внешнего сканера
      window.addEventListener('message', handleMessageFromScanner);
    });
    
    // Обработка сообщений от внешнего сканера
    function handleMessageFromScanner(event) {
      // Проверка источника для безопасности
      // if (event.origin !== 'https://tvoj-skaner.vercel.app') return;
      
      const data = event.data;
      
      if (data?.type === 'barcode_scanned' && data.barcode) {
        // Отправляем данные в Apps Script
        google.script.run
          .withSuccessHandler(result => {
            if (result?.success) {
              locationScanCount++;
              counterValue.textContent = locationScanCount;
              showToast('✓ ' + (data.barcode.length > 22 ? data.barcode.substring(0,20)+'…' : data.barcode));
              playBeep();
            } else {
              showToast('⚠ ' + (result?.error || 'Ошибка'), true);
            }
          })
          .withFailureHandler(err => {
            showToast('⚠ Ошибка связи', true);
            console.error(err);
          })
          .receiveScannedData({
            barcode: data.barcode,
            location: currentLocation,
            timestamp: new Date().toISOString()
          });
      }
    }
    
    // Завершение сканирования
    btnCloseScanner.addEventListener('click', () => {
      scannerWindowEl.classList.remove('active');
      scannerFrame.src = 'about:blank'; // Очистка iframe
      window.removeEventListener('message', handleMessageFromScanner);
      showToast('⏹ Сканирование завершено');
    });
    
    // Вспомогательные функции
    function showToast(msg, isError = false) {
      toastText.textContent = msg;
      toast.className = isError ? 'show error' : 'show';
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { toast.className = ''; }, 1200);
    }
    
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.value = 0.12;
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.07);
      } catch(e) {}
    }
    
    // Фокус при загрузке
    window.addEventListener('load', () => {
      setTimeout(() => locationInput.focus(), 400);
    });
  </script>
</body>
</html>
